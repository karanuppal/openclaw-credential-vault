name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run unit tests
        run: npm test

  test-resolver:
    name: Rust Resolver Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resolver/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('resolver/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: resolver
        run: cargo test

      - name: Build release binary
        working-directory: resolver
        run: cargo build --release --target x86_64-unknown-linux-musl

  install-verify:
    name: Install Verification (${{ matrix.platform }})
    runs-on: ubuntu-latest
    needs: [test-typescript, test-resolver]
    strategy:
      fail-fast: false
      matrix:
        platform: [debian12, ubuntu24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack tarball
        run: npm pack --pack-destination /tmp/

      - name: Build Docker image (${{ matrix.platform }})
        run: |
          docker build \
            -f tests/install-verify/Dockerfile.${{ matrix.platform }} \
            -t vault-verify-${{ matrix.platform }} \
            tests/install-verify/

      - name: Run install verification (${{ matrix.platform }})
        run: |
          TARBALL=$(ls /tmp/openclaw-credential-vault-*.tgz | tail -1)
          bash tests/install-verify/run.sh --platform ${{ matrix.platform }}

  test-cross-compat:
    name: Cross-Language Compatibility
    runs-on: ubuntu-latest
    needs: [test-typescript, test-resolver]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            resolver/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('resolver/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust resolver
        working-directory: resolver
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Copy resolver binary
        run: cp resolver/target/x86_64-unknown-linux-musl/release/openclaw-vault-resolver resolver/openclaw-vault-resolver

      - name: Install Node dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Run cross-compatibility tests
        run: npm run test:cross
