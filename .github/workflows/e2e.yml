name: E2E Tests

on:
  push:
    branches: [main, e2e-test-design]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-linux:
    name: E2E (${{ matrix.platform }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu22, ubuntu24, debian12, alpine]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run E2E tests (${{ matrix.platform }})
        run: bash tests/e2e/run-e2e.sh --platform ${{ matrix.platform }}

  e2e-macos:
    name: E2E (macOS)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install OpenClaw
        run: npm install -g openclaw

      - name: Run E2E tests (macOS)
        run: bash tests/e2e/run-e2e.sh --platform macos

  e2e-results:
    name: E2E Results
    runs-on: ubuntu-latest
    needs: [e2e-linux, e2e-macos]
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.e2e-linux.result }}" == "failure" ]] || \
             [[ "${{ needs.e2e-macos.result }}" == "failure" ]]; then
            echo "❌ E2E tests failed"
            exit 1
          fi
          echo "✅ All E2E tests passed"
